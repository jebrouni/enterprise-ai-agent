global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ai-agent'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ai-agent:8080']
    scrape_interval: 10s

  - job_name: 'keycloak'
    metrics_path: '/realms/ai-agent-realm/metrics'
    static_configs:
      - targets: ['keycloak:8080']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
