# ════════════════════════════════════════════════════════════
#  MODULE SÉCURITÉ — Configuration Keycloak & Spring Security
# ════════════════════════════════════════════════════════════

# ── Keycloak / OAuth2 Resource Server ────────────────────────────────────────
# URL du serveur Keycloak (doit être accessible depuis l'application)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/ai-agent-realm

# URL de la JWKS pour validation des signatures JWT
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/ai-agent-realm/protocol/openid-connect/certs

# ── Keycloak Properties ───────────────────────────────────────────────────────
keycloak.realm=ai-agent-realm
keycloak.resource=ai-agent-client
keycloak.auth-server-url=http://localhost:8180
keycloak.admin.client-id=admin-cli
keycloak.admin.username=${KEYCLOAK_ADMIN_USER:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# ── Rate Limiting ─────────────────────────────────────────────────────────────
rate-limit.user-limit=30
rate-limit.admin-limit=100
rate-limit.window-seconds=60
